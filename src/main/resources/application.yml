spring:
  application:
    name: society360-backend

  # ── Virtual Threads (Project Loom) ──────────────────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── DataSource ───────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/society360}
    username: ${DB_USERNAME:society360}
    password: ${DB_PASSWORD:society360}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  # ── JPA ──────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate           # Flyway owns DDL; JPA only validates
    show-sql: false
    open-in-view: false            # Never use OSIV — forces explicit transactions
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100

  # ── Flyway ───────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── File Upload ──────────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

# ── Server ───────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/csv
  error:
    include-message: always
    include-binding-errors: always

# ── JWT ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-256bit-random-value-in-production}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000    # 7 days
  base-domain: ${BASE_DOMAIN:society360.in}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.society360: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

---
# ── Production profile overrides ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    com.society360: INFO
    org.hibernate.SQL: WARN
